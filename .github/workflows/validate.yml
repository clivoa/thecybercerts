name: Validate Catalog

on:
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/validate_catalog.py"
      - "scripts/build_catalog.py"
  pull_request:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/validate_catalog.py"
      - "scripts/build_catalog.py"

jobs:
  validate:
    name: Validate & Build Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate catalog
        run: python3 scripts/validate_catalog.py

      - name: Build catalog.json
        run: python3 scripts/build_catalog.py

      - name: Check catalog.json is up to date
        run: |
          if ! git diff --exit-code data/catalog.json; then
            echo ""
            echo "ERROR: data/catalog.json is out of date."
            echo "Run 'python3 scripts/build_catalog.py' and commit the result."
            exit 1
          fi
